<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Thaali — a free, ad-free community cookbook. By cooks, for everyone. No ads, no paywall, ever."
    />
    <title>Thaali — A free community cookbook</title>

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#e8821e" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Thaali" />
    <meta property="og:title" content="Thaali — A free community cookbook" />
    <meta property="og:description" content="A free, ad-free community cookbook. By cooks, for everyone. No ads, no paywall, ever." />

    <meta property="og:image" content="https://thaali.app/logo/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Thaali — A free community cookbook" />
    <meta name="twitter:description" content="A free, ad-free community cookbook. By cooks, for everyone. No ads, no paywall, ever." />
    <meta name="twitter:image" content="https://thaali.app/logo/og-image.jpg" />
